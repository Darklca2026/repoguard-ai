name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    - run: npm ci
    - run: npm run test
    - run: npm run build
    - name: Run RepoGuard AI on incoming PRs (Dogfooding)
      run: |
        npm install -g .
        repoguard-ai scan . --fail-on HIGH
