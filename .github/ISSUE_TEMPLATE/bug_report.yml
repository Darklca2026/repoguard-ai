name: Bug Report
description: Create a report to help us improve RepoGuard AI
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of RepoGuard AI are you using?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? Include snippets if possible.
    validations:
      required: true
